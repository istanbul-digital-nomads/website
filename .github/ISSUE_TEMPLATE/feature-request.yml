name: Feature Request
description: Suggest a new feature or improvement for the website
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: textarea
    id: user-story
    attributes:
      label: User Story
      description: Who benefits and how?
      placeholder: "As a [type of user], I want [feature] so that [benefit]."
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions or workarounds?
    validations:
      required: false

  - type: textarea
    id: mockups
    attributes:
      label: Mockups / Screenshots
      description: If you have any visual ideas, share them here.
    validations:
      required: false
